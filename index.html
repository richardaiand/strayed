<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STRAYED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top bar: title + cat mood/info -->
  <header id="top-bar">
    <div class="title-block">
      <h1>STRAYED</h1>
    </div>

    <div id="cat-info" class="cat-info hidden">
      <span id="cat-mood" class="cat-mood">🐈</span>
      <div class="cat-meta">
        <span id="cat-name">the cat</span>
        <span id="cat-breed">—</span>
        <span id="cat-personality">—</span>
      </div>
      <div class="trust-bar mini"><div id="trust-fill" class="trust-fill"></div></div>
      <span id="trust-label">mood: uncertain</span>
    </div>

    <div id="controls">
      <button id="music-toggle" class="icon-btn" title="toggle music" aria-label="toggle music">♪</button>
      <button id="restart" class="icon-btn hidden" title="start over" aria-label="start over">↺</button>
      <button id="toggle-log" class="icon-btn hidden" title="memory" aria-label="toggle memory">☰</button>
    </div>
  </header>

  <!-- Scene stage: pixel art centered here -->
  <main id="scene-stage">
    <canvas id="pixel-canvas" width="128" height="80"></canvas>
    <div id="scene-overlay"></div>
  </main>

  <!-- Dialogue box (bottom) -->
  <div id="chat-box">
    <div id="dialogue-box">
      <div id="name-plate" class="name-plate">RAY</div>
      <div id="passage"></div>
      <div id="advance-indicator" class="advance-indicator hidden">▼</div>
    </div>
    <div id="choices"></div>
    <div id="free-input" class="free-input hidden">
      <p id="input-prompt"></p>
      <input type="text" id="player-text" placeholder="Type to the cat..." autocomplete="off" />
      <button id="submit-text">say it</button>
    </div>
  </div>

  <!-- Memory log (collapsible) -->
  <section id="log" class="panel hidden">
    <h3>Memory</h3>
    <ul id="log-list"></ul>
  </section>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/autumn-jazz-drift.mp3" type="audio/mpeg" />
  </audio>

  <script src="pixelart.js"></script>
  <script src="game.js"></script>
</body>
</html>
