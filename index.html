<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STRAYED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Full-screen pixel art scene background -->
  <canvas id="pixel-canvas" width="128" height="80"></canvas>
  <div id="scene-overlay"></div>

  <!-- Title overlay -->
  <header id="title-bar">
    <h1>STRAYED</h1>
    <p class="tagline">What are you willing to slow down for?</p>
  </header>

  <!-- Controls (top-right) -->
  <div id="controls">
    <button id="music-toggle" class="icon-btn" title="toggle music" aria-label="toggle music">♪</button>
    <button id="restart" class="icon-btn hidden" title="start over" aria-label="start over">↺</button>
    <button id="toggle-log" class="icon-btn hidden" title="memory" aria-label="toggle memory">☰</button>
  </div>

  <!-- Cat mood sidebar (right side) -->
  <aside id="cat-info" class="sidebar hidden">
    <div class="cat-card">
      <span id="cat-emoji" class="cat-emoji">🐱</span>
      <div class="cat-details">
        <h2 id="cat-name">the cat</h2>
        <p id="cat-breed">—</p>
        <p id="cat-personality">—</p>
        <div id="trust-bar" class="trust-bar"><div id="trust-fill" class="trust-fill"></div></div>
        <p id="trust-label">trust: uncertain</p>
      </div>
    </div>
  </aside>

  <!-- Memory log (collapsible) -->
  <section id="log" class="panel hidden">
    <h3>Memory</h3>
    <ul id="log-list"></ul>
  </section>

  <!-- Dialogue box (bottom, Phoenix Wright style) -->
  <div id="chat-box">
    <div id="dialogue-box">
      <div id="name-plate" class="name-plate">RAY</div>
      <div id="passage"></div>
      <div id="advance-indicator" class="advance-indicator hidden">▼</div>
    </div>
    <div id="choices"></div>
    <div id="free-input" class="free-input hidden">
      <p id="input-prompt"></p>
      <input type="text" id="player-text" placeholder="Type to the cat..." autocomplete="off" />
      <button id="submit-text">say it</button>
    </div>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="assets/autumn-jazz-drift.mp3" type="audio/mpeg" />
  </audio>

  <script src="pixelart.js"></script>
  <script src="game.js"></script>
</body>
</html>
